# light hoặc dark
colorTheme: light
# Điều chỉnh cỡ chữ trong trình soạn thảo và xem trước
fontSizeFactor: 1
# Điều chỉnh độ rộng văn bản tối đa trong trình soạn thảo và xem trước
maxWidthFactor: 1
# Tần suất tự đồng bộ (mili-giây). Tối thiểu 60000.
autoSyncEvery: 90000

# Thiết lập trình soạn thảo
editor:
  # Tự đánh số danh sách
  listAutoNumber: true
  # Hiển thị hình ảnh trong trình soạn thảo
  inlineImages: true
  # Chỉ dùng font đơn cách
  monospacedFontOnly: false

# Phím tắt
# Xem https://craig.is/killing/mice
shortcuts:
  mod+s: sync
  mod+f: find
  mod+alt+f: replace
  mod+g: replace
  mod+shift+b: bold
  mod+shift+c: clist
  mod+shift+k: code
  mod+shift+h: heading
  mod+shift+r: hr
  mod+shift+g: image
  mod+shift+i: italic
  mod+shift+l: link
  mod+shift+o: olist
  mod+shift+q: quote
  mod+shift+s: strikethrough
  mod+shift+t: table
  mod+shift+u: ulist
  '= = > space':
    method: expand
    params:
    - '==> '
    - '⇒ '
  '< = = space':
    method: expand
    params:
    - '<== '
    - '⇐ '

# Tuỳ chọn truyền cho wkhtmltopdf
# Xem https://wkhtmltopdf.org/usage/wkhtmltopdf.txt
wkhtmltopdf:
  marginTop: 25
  marginRight: 25
  marginBottom: 25
  marginLeft: 25
  # A3, A4, Legal hoặc Letter
  pageSize: A4

# Tuỳ chọn truyền cho pandoc
# Xem https://pandoc.org/MANUAL.html
pandoc:
  highlightStyle: kate
  toc: true
  tocDepth: 3

# Tuỳ chọn chuyển HTML sang Markdown
# Xem https://github.com/domchristie/turndown
turndown:
  headingStyle: atx
  hr: ----------
  bulletListMarker: '-'
  codeBlockStyle: fenced
  fence: '```'
  emDelimiter: _
  strongDelimiter: '**'
  linkStyle: inlined
  linkReferenceStyle: full

# Nội dung commit mặc định cho GitHub/GitLab
git:
  createFileMessage: 'Tạo {{path}} từ Weha Markdown'
  updateFileMessage: 'Cập nhật {{path}} từ Weha Markdown'
  deleteFileMessage: 'Xoá {{path}} từ Weha Markdown'

# Nội dung mặc định cho file mới
newFileContent: |



  > Viết bằng Weha Markdown.

# Thuộc tính mặc định cho file mới
newFileProperties: |
#  extensions:
#    preset: gfm

